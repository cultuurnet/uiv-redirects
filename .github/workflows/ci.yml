name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: arc-runner-set
    container:
      image: ruby:3.2.3
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install dependencies
        run: bundle install

      - name: Run cucumber
        run: bundle exec cucumber
